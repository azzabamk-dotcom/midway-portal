<! DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>MIDWAY COLLEGES - Student Portal</title>
 <style>
 :root {
 --midway-yellow: #ffcc00;
 --midway-gray: #e0e0e0;
 --midway-dark: #333;
 }

body {
 font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
 background-color: var(--midway-gray);
 margin: 0;
 display: flex;
 justify-content: center;
 align-items: center;
 min-height: 100vh;
 }

.container {
 background: white;
 padding: 2rem;
 border-radius: 8px;
 box-shadow: 0 4px 15px rgba(0,0,0,0.1);
 width: 90%;
 max-width: 1000px;
 text-align: center;
 }

/* Header Styles */
 header {
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 20px;
 margin-bottom: 30px;
 }

header img {
 width: 80px; /* Adjust size as needed */
 height: auto;
 }

header h1 {
 color: black;
 margin: 0;
 font-size: 1.5rem;
 }

/* Login Form */
 #login-section {
 max-width: 400px;
 margin: 0 auto;
 }

.input-group {
 margin-bottom: 15px;
 text-align: left;
 }

input {
 width: 100%;
 padding: 10px;
 margin-top: 5px;
 border: 1px solid #ccc;
 border-radius: 4px;
 box-sizing: border-box;
 }

#login-btn {
 background-color: var(--midway-yellow);
 color: black;
 border: none;
 padding: 12px 30px;
 font-weight: bold;
 cursor: pointer;
 border-radius: 4px;
 width: 100%;
 transition: background 0.3s;
 }

#login-btn:hover {
 background-color: #e6b800;
 }

/* Dashboard Styles */
 #dashboard {
 display: none;
 }

.welcome-banner {
 background: #f9f9f9;
 padding: 20px;
 border-radius: 8px;
 border-left: 5px solid var(--midway-yellow);
 margin-bottom: 20px;
 }

.nav-menu {
 display: flex;
 justify-content: space-around;
 background: var(--midway-dark);
 padding: 10px;
 border-radius: 5px;
 margin-bottom: 20px;
 }

.nav-menu button {
 background: transparent;
 color: white;
 border: none;
 cursor: pointer;
 font-weight: bold;
 padding: 10px;
 }

.nav-menu button:hover {
 color: var(--midway-yellow);
 }

/* Grades Table */
 .grades-container {
 display: none;
 margin-top: 20px;
 overflow-x: auto;
 }

table {
 width: 100%;
 border-collapse: collapse;
 margin-top: 15px;
 font-size: 0.9rem;
 }

th {
 background-color: var(--midway-dark);
 color: white;
 padding: 12px;
 }

td {
 border: 1px solid #ddd;
 padding: 10px;
 text-align: left;
 }

tr:nth-child(even) { background-color: #f2f2f2; }

.sy-select {
 padding: 8px;
 border-radius: 4px;
 margin-bottom: 10px;
 }
 </style>
</head>
<body>
